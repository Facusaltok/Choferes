<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ingreso Sistema</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0c0c0c;
color:white;
font-family:Inter;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:#121212;

width:350px;
}

.title{
font-family:Orbitron;
}

input{
background:#0c0c0c;
border:1px solid #333;
padding:10px;
width:100%;
margin-bottom:10px;

}

button{
background:#2563eb;
padding:10px;
width:100%;

}

</style>

</head>

<body>

<div class="card">

<h2 class="title text-xl mb-6 text-center">
CUSTODIAS SAN ISIDRO
</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">
Ingresar
</button>

</div>

<script>

const SUPABASE_URL="https://cdnwxerixgrgvrdsotaf.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnd4ZXJpeGdyZ3ZyZHNvdGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4NjIsImV4cCI6MjA4ODI5MTg2Mn0.RWdHadeoNvjMHomUu158umWEcmlUXNLIF3TrFwgJy3k"

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function login(){

const {data,error}=await sb.auth.signInWithPassword({

email:email.value,
password:password.value

})

if(error){

alert(error.message)
return

}

const user=data.user

const {data:perfil}=await sb
.from("users")
.select("rol")
.eq("auth_id",user.id)
.single()

if(!perfil){

alert("Usuario no registrado en el sistema")
return

}

if(perfil.rol==="admin"){

location="dashboard.html"

}else{

location="chofer.html"

}

}

</script>

</body>
