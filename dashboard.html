<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Custodias San Isidro — Panel Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0c0c0c;
color:white;
font-family:Inter;
}

.title{
font-family:Orbitron;
}

.card{
background:#121212;
border-radius:14px;
border:1px solid #1f1f1f;
padding:20px;
}

.navbtn{
padding:10px 18px;
border-radius:10px;
background:#1a1a1a;
}

.navbtn.active{
background:#2563eb;
}

button.primary{
background:#2563eb;
padding:10px 18px;
border-radius:8px;
}

button.danger{
background:#dc2626;
padding:6px 10px;
border-radius:6px;
}

select,input{
background:#0c0c0c;
border:1px solid #333;
padding:10px;
width:100%;
margin-bottom:10px;
border-radius:8px;
}

table{
width:100%;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #1f1f1f;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-8">

<div class="flex justify-between mb-8">

<h1 class="title text-3xl">
CUSTODIAS SAN ISIDRO
</h1>

<button id="logout" class="primary">
Cerrar sesión
</button>

</div>

<div class="flex gap-3 mb-6">

<button class="navbtn active" data-tab="vehiculos">Vehículos</button>
<button class="navbtn" data-tab="usuarios">Usuarios</button>
<button class="navbtn" data-tab="mapa">Mapa</button>

</div>

<div class="card">

<!-- VEHICULOS -->

<div id="vehiculosPanel">

<h3>Crear Vehículo</h3>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="dominio" placeholder="Patente">

<button class="primary" onclick="crearVehiculo()">
Crear Vehículo
</button>

<table>

<thead>

<tr>
<th>Marca</th>
<th>Modelo</th>
<th>Dominio</th>
<th></th>
</tr>

</thead>

<tbody id="vehiculosLista"></tbody>

</table>

</div>

<!-- USUARIOS -->

<div id="usuariosPanel" style="display:none">

<h3>Crear Usuario</h3>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="dni" placeholder="DNI">
<input id="email" placeholder="Email">
<input id="password" placeholder="Contraseña">

<select id="rol">
<option value="chofer">Chofer</option>
<option value="admin">Administrador</option>
</select>

<button class="primary" onclick="crearUsuario()">
Crear Usuario
</button>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Email</th>
<th>Rol</th>
<th></th>
</tr>

</thead>

<tbody id="usuariosLista"></tbody>

</table>

</div>

<!-- MAPA -->

<div id="mapPanel" style="display:none">

<div id="map" style="height:500px"></div>

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://cdnwxerixgrgvrdsotaf.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnd4ZXJpeGdyZ3ZyZHNvdGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4NjIsImV4cCI6MjA4ODI5MTg2Mn0.RWdHadeoNvjMHomUu158umWEcmlUXNLIF3TrFwgJy3k"

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

document.getElementById("logout").onclick=async()=>{

await sb.auth.signOut()

location="index.html"

}

/* NAVEGACION */

document.querySelectorAll(".navbtn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

vehiculosPanel.style.display="none"
usuariosPanel.style.display="none"
mapPanel.style.display="none"

if(btn.dataset.tab==="vehiculos"){
vehiculosPanel.style.display="block"
cargarVehiculos()
}

if(btn.dataset.tab==="usuarios"){
usuariosPanel.style.display="block"
cargarUsuarios()
}

if(btn.dataset.tab==="mapa"){
mapPanel.style.display="block"
cargarMapa()
}

}

})

/* VEHICULOS */

async function crearVehiculo(){

await sb.from("vehiculos").insert({

marca:marca.value,
modelo:modelo.value,
dominio:dominio.value

})

cargarVehiculos()

}

async function cargarVehiculos(){

const {data}=await sb.from("vehiculos").select("*")

vehiculosLista.innerHTML=""

data.forEach(v=>{

vehiculosLista.innerHTML+=`

<tr>

<td>${v.marca}</td>
<td>${v.modelo}</td>
<td>${v.dominio}</td>

<td>

<button class="danger"
onclick="borrarVehiculo('${v.id}')">

Eliminar

</button>

</td>

</tr>

`

})

}

async function borrarVehiculo(id){

await sb.from("vehiculos").delete().eq("id",id)

cargarVehiculos()

}

/* USUARIOS */

async function crearUsuario(){

const {data,error}=await sb.auth.signUp({

email:email.value,
password:password.value

})

if(error){

alert(error.message)
return

}

await sb.from("users").insert({

auth_id:data.user.id,

nombre:nombre.value,
apellido:apellido.value,
dni:dni.value,
email:email.value,
rol:rol.value

})

cargarUsuarios()

}

async function cargarUsuarios(){

const {data}=await sb.from("users").select("*")

usuariosLista.innerHTML=""

data.forEach(u=>{

usuariosLista.innerHTML+=`

<tr>

<td>${u.nombre}</td>
<td>${u.apellido}</td>
<td>${u.email}</td>

<td>

<select onchange="cambiarRol('${u.id}',this.value)">

<option ${u.rol=="chofer"?"selected":""}>chofer</option>
<option ${u.rol=="admin"?"selected":""}>admin</option>

</select>

</td>

<td>

<button class="danger"
onclick="borrarUsuario('${u.id}')">

Eliminar

</button>

</td>

</tr>

`

})

}

async function cambiarRol(id,rol){

await sb.from("users").update({

rol

}).eq("id",id)

}

async function borrarUsuario(id){

await sb.from("users").delete().eq("id",id)

cargarUsuarios()

}

/* MAPA */

let map

function cargarMapa(){

if(!map){

map=L.map('map').setView([-34.6,-58.4],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

}

actualizarMapa()

setInterval(actualizarMapa,5000)

}

async function actualizarMapa(){

const {data}=await sb.from("gps").select("*")

data.forEach(g=>{

const marker=L.marker([g.lat,g.lng]).addTo(map)

marker.bindPopup(`

Vehículo en vivo<br><br>

<a target="_blank"
href="https://www.waze.com/ul?ll=${g.lat},${g.lng}&navigate=yes">

Navegar con Waze

</a>

`)

})

}

cargarVehiculos()

</script>

</body>
</html>
