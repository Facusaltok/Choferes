<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Custodias San Isidro — Control Operativo</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0c0c0c;
color:white;
font-family:Inter;
}

.title{
font-family:Orbitron;
letter-spacing:1px;
}

.card{
background:#121212;
border-radius:14px;
border:1px solid #1f1f1f;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.kpi{
font-size:30px;
font-weight:700;
}

.kpi-label{
font-size:12px;
color:#aaa;
}

.navbtn{
padding:10px 18px;
border-radius:10px;
font-weight:600;
background:#1a1a1a;
}

.navbtn.active{
background:#2563eb;
}

.tablewrap{
overflow:auto;
max-height:65vh;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
font-size:12px;
color:#aaa;
padding:10px;
}

td{
padding:10px;
border-top:1px solid #1f1f1f;
}

tr:hover{
background:#161616;
}

button.primary{
background:#2563eb;
padding:10px 18px;
border-radius:8px;
}

button.orange{
background:#ea580c;
padding:10px 18px;
border-radius:8px;
}

input{
color:white;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-8">

<!-- HEADER -->

<div class="flex justify-between items-center mb-10">

<div>
<h1 class="title text-3xl">CUSTODIAS SAN ISIDRO</h1>
<p class="text-gray-400 text-sm">Sistema operativo de flota</p>
</div>

<button id="logout" class="primary">Cerrar sesión</button>

</div>

<!-- KPIs -->

<div class="grid md:grid-cols-4 gap-6 mb-10">

<div class="card">
<div class="kpi" id="kVehiculos">0</div>
<div class="kpi-label">Vehículos activos</div>
</div>

<div class="card">
<div class="kpi" id="kChoferes">0</div>
<div class="kpi-label">Choferes</div>
</div>

<div class="card">
<div class="kpi text-green-400" id="kCombustible">0</div>
<div class="kpi-label">Combustible cargado</div>
</div>

<div class="card">
<div class="kpi text-orange-400" id="kSiniestros">0</div>
<div class="kpi-label">Siniestros</div>
</div>

</div>

<!-- GRAFICO -->

<div class="card mb-10">
<canvas id="fuelChart"></canvas>
</div>

<!-- NAVEGACION -->

<div class="flex flex-wrap gap-3 mb-6">

<button class="navbtn active" data-tab="vehiculos">Vehículos</button>
<button class="navbtn" data-tab="choferes">Choferes</button>
<button class="navbtn" data-tab="jornadas">Jornadas</button>
<button class="navbtn" data-tab="combustible">Combustible</button>
<button class="navbtn" data-tab="mapa">Mapa</button>

</div>

<!-- TABLA -->

<div class="card">

<div class="flex justify-between mb-4">

<input id="buscar" class="bg-black p-2 rounded border border-gray-700" placeholder="Buscar">

<button id="nuevo" class="orange">Nuevo</button>

</div>

<div id="map" style="height:300px;display:none;margin-bottom:20px"></div>

<div class="tablewrap">

<table>

<thead id="thead"></thead>
<tbody id="rows"></tbody>

</table>

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://cdnwxerixgrgvrdsotaf.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnd4ZXJpeGdyZ3ZyZHNvdGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4NjIsImV4cCI6MjA4ODI5MTg2Mn0.RWdHadeoNvjMHomUu158umWEcmlUXNLIF3TrFwgJy3k"

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let current="vehiculos"
let perfil=null

const tabs={

vehiculos:{
table:"vehiculos",
head:["Marca","Modelo","Dominio","Interno"]
},

choferes:{
table:"users",
head:["Nombre","Apellido","DNI","Legajo"]
},

jornadas:{
table:"registros_diarios",
head:["Fecha","Vehículo","Chofer","KM inicio","KM fin"]
},

combustible:{
table:"combustible_cargas",
head:["Litros","Monto","Tipo","Fecha"]
}

}

/* LOGIN */

async function init(){

const {data:userData}=await sb.auth.getUser()

const {data}=await sb
.from("users")
.select("*")
.eq("auth_id",userData.user.id)
.single()

perfil=data

load()
loadKPI()
grafico()

gps()

}

document.querySelectorAll(".navbtn").forEach(b=>{

b.onclick=async()=>{

document.querySelectorAll(".navbtn").forEach(x=>x.classList.remove("active"))

b.classList.add("active")

current=b.dataset.tab

if(current==="mapa"){
mostrarMapa()
return
}

document.getElementById("map").style.display="none"

await load()

}

})

async function load(){

const tab=tabs[current]

document.getElementById("thead").innerHTML=

"<tr>"+tab.head.map(h=>"<th>"+h+"</th>").join("")+"</tr>"

const {data}=await sb.from(tab.table).select("*")

let rows=""

data.forEach(r=>{

rows+="<tr>"+

Object.values(r).slice(1,5).map(v=>"<td>"+v+"</td>").join("")

+"</tr>"

})

document.getElementById("rows").innerHTML=rows

}

/* KPIs */

async function loadKPI(){

const v=await sb.from("vehiculos").select("*")
const c=await sb.from("users").select("*")
const f=await sb.from("combustible_cargas").select("*")
const s=await sb.from("siniestros_imagenes").select("*")

document.getElementById("kVehiculos").innerText=v.data.length
document.getElementById("kChoferes").innerText=c.data.length
document.getElementById("kCombustible").innerText=f.data.length
document.getElementById("kSiniestros").innerText=s.data.length

}

/* GRAFICO */

async function grafico(){

const {data}=await sb.from("combustible_cargas").select("*")

new Chart(

document.getElementById("fuelChart"),

{
type:"bar",
data:{
labels:data.map(x=>x.fecha),
datasets:[{
label:"Litros",
data:data.map(x=>x.litros),
backgroundColor:"#22c55e"
}]
}
})

}

/* GPS */

function gps(){

navigator.geolocation.getCurrentPosition(async pos=>{

const {data:user}=await sb.auth.getUser()

await sb.from("gps").insert({

user_id:user.user.id,
lat:pos.coords.latitude,
lng:pos.coords.longitude

})

})

}

/* MAPA */

function mostrarMapa(){

document.getElementById("map").style.display="block"

const map=L.map('map').setView([-34.6,-58.4],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

cargarGPS(map)

}

async function cargarGPS(map){

const {data}=await sb
.from("gps")
.select("*")
.order("fecha",{ascending:false})
.limit(20)

data.forEach(g=>{

L.marker([g.lat,g.lng]).addTo(map)

})

}

/* LOGOUT */

document.getElementById("logout").onclick=async()=>{

await sb.auth.signOut()

location="index.html"

}

init()

</script>

</body>
</html>
