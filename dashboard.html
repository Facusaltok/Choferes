<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Custodias San Isidro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b0b;
font-family:Inter;
color:white;
margin:0;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
background:#0f0f0f;
padding-bottom:80px;
}

.header{
padding:18px;
border-bottom:1px solid #1f1f1f;
}

.title{
font-family:Orbitron;
font-size:18px;
}

.card{
background:#151515;
border-radius:14px;
padding:16px;
margin:16px;
}

.input{
width:100%;
padding:12px;
margin-bottom:10px;
background:#0d0d0d;
border:1px solid #2a2a2a;
border-radius:8px;
color:white;
}

.btn{
background:#2563eb;
padding:14px;
border-radius:10px;
width:100%;
font-weight:600;
margin-top:10px;
}

.nav{

position:fixed;
bottom:0;
left:0;
right:0;

max-width:420px;
margin:auto;

display:flex;
justify-content:space-around;

background:#121212;

border-top:1px solid #1f1f1f;

padding:10px;

}

.nav button{
background:none;
color:#aaa;
font-size:12px;
}

.nav button.active{
color:#3b82f6;
}

</style>

</head>

<body>

<div class="app">

<header class="header">
<div class="title">Custodias San Isidro</div>
</header>

<div id="screen"></div>

<nav class="nav">

<button data-screen="inicio" class="active">Inicio</button>
<button data-screen="jornada">Jornada</button>
<button data-screen="combustible">Combustible</button>
<button data-screen="mapa">Mapa</button>
<button data-screen="admin">Admin</button>
<button data-screen="perfil">Perfil</button>

</nav>

</div>

<script>

const SUPABASE_URL = "https://cdnwxerixgrgvrdsotaf.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnd4ZXJpeGdyZ3ZyZHNvdGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4NjIsImV4cCI6MjA4ODI5MTg2Mn0.RWdHadeoNvjMHomUu158umWEcmlUXNLIF3TrFwgJy3k"

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let perfil=null

/* LOGIN CHECK */

async function init(){

const {data:userData}=await sb.auth.getUser()

if(!userData.user){

location="index.html"
return

}

const {data}=await sb
.from("users")
.select("*")
.eq("auth_id",userData.user.id)
.single()

perfil=data

enviarGPS()

loadScreen("inicio")

}

/* NAVEGACION */

document.querySelectorAll(".nav button").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

loadScreen(btn.dataset.screen)

}

})

/* PANTALLAS */

function loadScreen(screen){

const s=document.getElementById("screen")

/* INICIO */

if(screen==="inicio"){

s.innerHTML=`

<div class="card">

<h3>Bienvenido</h3>

<p>${perfil.nombre}</p>

<p>Rol: ${perfil.rol}</p>

</div>

<div class="card">

<canvas id="fuelChart"></canvas>

</div>

`

graficoCombustible()

}

/* JORNADA */

if(screen==="jornada"){

s.innerHTML=`

<div class="card">

<h3>Inicio de Jornada</h3>

<select id="vehiculo" class="input"></select>

<input id="km_inicio" class="input" placeholder="Kilómetros">

<input id="combustible_inicio" class="input" placeholder="Combustible %">

<button onclick="iniciarJornada()" class="btn">
Iniciar Jornada
</button>

</div>

`

cargarVehiculos()

}

/* COMBUSTIBLE */

if(screen==="combustible"){

s.innerHTML=`

<div class="card">

<h3>Cargar Combustible</h3>

<input id="litros" class="input" placeholder="Litros">

<input id="monto" class="input" placeholder="Monto">

<select id="tipo" class="input">

<option>Nafta</option>
<option>Diesel</option>

</select>

<input id="ticket" type="file">

<button onclick="cargarCombustible()" class="btn">
Guardar
</button>

</div>

`

}

/* MAPA */

if(screen==="mapa"){

s.innerHTML=`

<div class="card">

<div id="map" style="height:300px"></div>

</div>

`

setTimeout(cargarMapa,300)

}

/* ADMIN */

if(screen==="admin"){

if(perfil.rol!=="admin"){

s.innerHTML="<div class='card'>Sin acceso</div>"
return

}

s.innerHTML=`

<div class="card">

<h3>Crear Chofer</h3>

<input id="nombre" class="input" placeholder="Nombre">

<input id="apellido" class="input" placeholder="Apellido">

<input id="dni" class="input" placeholder="DNI">

<input id="email" class="input" placeholder="Email">

<input id="password" type="password" class="input" placeholder="Password">

<button onclick="crearChofer()" class="btn">
Crear Chofer
</button>

</div>

`

}

/* PERFIL */

if(screen==="perfil"){

s.innerHTML=`

<div class="card">

<button onclick="logout()" class="btn">
Cerrar sesión
</button>

</div>

`

}

}

/* VEHICULOS */

async function cargarVehiculos(){

const {data}=await sb.from("vehiculos").select("*")

const select=document.getElementById("vehiculo")

data.forEach(v=>{

const o=document.createElement("option")

o.value=v.id
o.text=v.marca+" "+v.modelo

select.appendChild(o)

})

}

/* JORNADA */

async function iniciarJornada(){

const vehiculo=document.getElementById("vehiculo").value
const km=document.getElementById("km_inicio").value
const comb=document.getElementById("combustible_inicio").value

const {data:userData}=await sb.auth.getUser()

await sb.from("registros_diarios").insert({

vehiculo_id:vehiculo,
chofer_id:userData.user.id,

kilometros_inicio:km,
combustible_inicio:comb

})

alert("Jornada iniciada")

}

/* COMBUSTIBLE */

async function cargarCombustible(){

const litros=document.getElementById("litros").value
const monto=document.getElementById("monto").value

await sb.from("combustible_cargas").insert({

litros,
monto

})

alert("Carga registrada")

}

/* CREAR CHOFER */

async function crearChofer(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await sb.auth.admin.createUser({

email,
password,
email_confirm:true

})

if(error){

alert(error.message)
return

}

await sb.from("users").insert({

auth_id:data.user.id,

nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
dni:document.getElementById("dni").value,

email:email,
rol:"chofer"

})

alert("Chofer creado")

}

/* GPS */

function enviarGPS(){

navigator.geolocation.getCurrentPosition(async pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

const {data:user}=await sb.auth.getUser()

await sb.from("gps").insert({

user_id:user.user.id,
lat,
lng

})

})

setInterval(enviarGPS,30000)

}

/* MAPA */

function cargarMapa(){

const map=L.map('map').setView([-34.6,-58.4],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

cargarGPS(map)

}

async function cargarGPS(map){

const {data}=await sb
.from("gps")
.select("*")
.order("fecha",{ascending:false})
.limit(10)

data.forEach(g=>{

L.marker([g.lat,g.lng]).addTo(map)

})

}

/* GRAFICO */

async function graficoCombustible(){

const {data}=await sb.from("combustible_cargas").select("*")

const litros=data.map(x=>x.litros)

new Chart(

document.getElementById("fuelChart"),

{
type:"bar",

data:{
labels:data.map(x=>x.fecha),
datasets:[{

label:"Litros",
data:litros

}]
}

})

}

/* LOGOUT */

async function logout(){

await sb.auth.signOut()

location="index.html"

}

init()

</script>

</body>
</html>
