<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Custodias San Isidro — Control Operativo</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0c0c0c;
color:white;
font-family:Inter;
}

.title{
font-family:Orbitron;
}

.card{
background:#121212;
border-radius:14px;
border:1px solid #1f1f1f;
padding:20px;
}

.navbtn{
padding:10px 18px;
border-radius:10px;
background:#1a1a1a;
}

.navbtn.active{
background:#2563eb;
}

button.primary{
background:#2563eb;
padding:10px 18px;
border-radius:8px;
}

input{
background:#0c0c0c;
border:1px solid #1f1f1f;
padding:10px;
border-radius:8px;
width:100%;
margin-bottom:10px;
}

table{
width:100%;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #1f1f1f;
}

</style>

</head>

<body>

<div class="max-w-7xl mx-auto p-8">

<div class="flex justify-between items-center mb-10">

<div>

<h1 class="title text-3xl">CUSTODIAS SAN ISIDRO</h1>
<p class="text-gray-400 text-sm">Sistema operativo de flota</p>

</div>

<button id="logout" class="primary">Cerrar sesión</button>

</div>

<div class="flex gap-3 mb-6">

<button class="navbtn active" data-tab="vehiculos">Vehículos</button>
<button class="navbtn" data-tab="choferes">Choferes</button>
<button class="navbtn" data-tab="mapa">Mapa en vivo</button>

</div>

<div class="card">

<div id="vehiculosPanel">

<h3 class="mb-4">Crear Vehículo</h3>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="dominio" placeholder="Patente">

<button onclick="crearVehiculo()" class="primary">
Crear Vehículo
</button>

<h3 class="mt-8 mb-2">Vehículos registrados</h3>

<table>

<thead>

<tr>
<th>Marca</th>
<th>Modelo</th>
<th>Patente</th>
</tr>

</thead>

<tbody id="vehiculosLista"></tbody>

</table>

</div>

<div id="choferPanel" style="display:none">

<h3 class="mb-4">Crear Chofer</h3>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="dni" placeholder="DNI">
<input id="email" placeholder="Email">
<input id="password" placeholder="Contraseña">

<button onclick="crearChofer()" class="primary">
Crear Chofer
</button>

<h3 class="mt-8 mb-2">Choferes registrados</h3>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>DNI</th>
<th>Email</th>
</tr>

</thead>

<tbody id="choferLista"></tbody>

</table>

</div>

<div id="mapPanel" style="display:none">

<div id="map" style="height:450px"></div>

</div>

</div>

</div>

<script>

const SUPABASE_URL="https://cdnwxerixgrgvrdsotaf.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkbnd4ZXJpeGdyZ3ZyZHNvdGFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTU4NjIsImV4cCI6MjA4ODI5MTg2Mn0.RWdHadeoNvjMHomUu158umWEcmlUXNLIF3TrFwgJy3k"

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

/* NAVEGACION */

document.querySelectorAll(".navbtn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".navbtn").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

document.getElementById("vehiculosPanel").style.display="none"
document.getElementById("choferPanel").style.display="none"
document.getElementById("mapPanel").style.display="none"

if(btn.dataset.tab==="vehiculos"){

document.getElementById("vehiculosPanel").style.display="block"
cargarVehiculos()

}

if(btn.dataset.tab==="choferes"){

document.getElementById("choferPanel").style.display="block"
cargarChoferes()

}

if(btn.dataset.tab==="mapa"){

document.getElementById("mapPanel").style.display="block"
cargarMapa()

}

}

})

/* CREAR VEHICULO */

async function crearVehiculo(){

await sb.from("vehiculos").insert({

marca:document.getElementById("marca").value,
modelo:document.getElementById("modelo").value,
dominio:document.getElementById("dominio").value

})

alert("Vehículo creado")

cargarVehiculos()

}

/* LISTA VEHICULOS */

async function cargarVehiculos(){

const {data}=await sb.from("vehiculos").select("*")

const lista=document.getElementById("vehiculosLista")

lista.innerHTML=""

data.forEach(v=>{

lista.innerHTML+=`

<tr>

<td>${v.marca}</td>
<td>${v.modelo}</td>
<td>${v.dominio}</td>

</tr>

`

})

}

/* CREAR CHOFER */

async function crearChofer(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await sb.auth.signUp({

email,
password

})

if(error){

alert(error.message)
return

}

await sb.from("users").insert({

auth_id:data.user.id,

nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
dni:document.getElementById("dni").value,
email:email,
rol:"chofer"

})

alert("Chofer creado")

cargarChoferes()

}

/* LISTA CHOFERES */

async function cargarChoferes(){

const {data}=await sb.from("users").select("*")

const lista=document.getElementById("choferLista")

lista.innerHTML=""

data.forEach(c=>{

lista.innerHTML+=`

<tr>

<td>${c.nombre}</td>
<td>${c.apellido}</td>
<td>${c.dni}</td>
<td>${c.email}</td>

</tr>

`

})

}

/* MAPA */

function cargarMapa(){

const map=L.map('map').setView([-34.6,-58.4],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

cargarGPS(map)

}

async function cargarGPS(map){

const {data}=await sb.from("gps").select("*")

data.forEach(g=>{

const marker=L.marker([g.lat,g.lng]).addTo(map)

marker.bindPopup(`

Vehículo en vivo

<br><br>

<a target="_blank"
href="https://www.waze.com/ul?ll=${g.lat},${g.lng}&navigate=yes">

Navegar con Waze

</a>

`)

})

}

document.getElementById("logout").onclick=async()=>{

await sb.auth.signOut()

location="index.html"

}

cargarVehiculos()

</script>

</body>
</html>
